<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FreshCart — Premium online grocery shopping. Browse fresh fruits, vegetables, dairy, bakery items and more. Fast delivery to your doorstep.">
  <title>FreshCart — Fresh Groceries Delivered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header" id="main-header">
    <div class="header-inner">
      <a href="#" class="logo" id="logo-link" onclick="app.navigate('home')">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Fresh<span class="logo-accent">Cart</span></span>
      </a>
      <div class="search-bar" id="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search groceries..." autocomplete="off">
      </div>
      <nav class="header-nav">
        <button class="nav-btn" id="nav-home" onclick="app.navigate('home')" title="Home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-btn" id="nav-orders" onclick="app.navigate('orders')" title="My Orders">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span>Orders</span>
        </button>
        <button class="nav-btn cart-btn" id="nav-cart" onclick="app.navigate('cart')" title="Shopping Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cart-badge">0</span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Content injected dynamically by JS -->
  </main>

  <!-- Toast notification -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/components/header.js"></script>
  <script src="/js/components/productCard.js"></script>
  <script src="/js/components/cartView.js"></script>
  <script src="/js/components/checkout.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
